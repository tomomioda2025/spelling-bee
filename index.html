<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Spelling Bee">
<meta name="theme-color" content="#FFB800">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>🐝 Spelling Bee</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --honey:#FFB800;--honey-dark:#E5A000;--honey-light:#FFF3CC;
  --mint:#4ECBA1;--mint-dark:#3AAA85;--mint-light:#E0F7F0;
  --coral:#FF7B7B;--coral-light:#FFEAEA;
  --sky:#6BB8FF;--sky-light:#E8F4FF;
  --purple:#B88AFF;--purple-light:#F3EEFF;
  --bg:#FFFDF5;--text:#3D2C00;--text-soft:#9A8060;--border:#FFE4A0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:var(--bg);}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,#FFE4A033 0%,transparent 50%),radial-gradient(circle at 80% 80%,#4ECBA122 0%,transparent 50%);pointer-events:none;z-index:0;}

#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  max-width:430px;margin:0 auto;
  padding:10px 12px 8px;
  gap:6px;
  z-index:1;
  overflow:hidden;
}

/* ── Header ── */
.header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:var(--honey-dark);display:flex;align-items:center;gap:5px;}
.logo-bee{font-size:22px;animation:wiggle 2.5s ease-in-out infinite;}
@keyframes wiggle{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}
.header-right{display:flex;align-items:center;gap:6px;}
.score-badge{background:var(--honey);color:var(--text);font-weight:800;font-size:13px;padding:4px 12px;border-radius:99px;box-shadow:0 3px 0 var(--honey-dark);}

/* ── Progress ── */
.progress-row{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.word-label{font-size:11px;font-weight:700;color:var(--text-soft);white-space:nowrap;min-width:68px;}
.prog-track{flex:1;height:8px;background:var(--honey-light);border-radius:99px;overflow:hidden;border:1.5px solid var(--border);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--honey),var(--mint));border-radius:99px;transition:width .4s cubic-bezier(.34,1.56,.64,1);}

/* ── Sound + nav row ── */
.sound-nav{display:flex;align-items:stretch;gap:6px;flex-shrink:0;}
.btn-nav{padding:0 14px;background:var(--purple-light);border:2px solid var(--purple);border-radius:12px;font-family:'Baloo 2',cursive;font-size:18px;font-weight:700;color:#6633BB;cursor:pointer;box-shadow:0 3px 0 #CC99EE;transition:transform .1s,box-shadow .1s;flex-shrink:0;}
.btn-nav:active{transform:translateY(2px);box-shadow:0 1px 0 #CC99EE;}
.sound-card{flex:1;background:var(--honey);border-radius:14px;padding:10px 8px;box-shadow:0 4px 0 var(--honey-dark);text-align:center;cursor:pointer;transition:transform .1s,box-shadow .1s;user-select:none;border:none;}
.sound-card:active{transform:translateY(3px);box-shadow:0 1px 0 var(--honey-dark);}
.sound-icon{font-size:22px;display:block;}
.sound-label{font-family:'Baloo 2',cursive;font-size:13px;font-weight:700;color:var(--text);margin-top:1px;}

/* ── Answer box ── */
.answer-wrap{background:white;border-radius:14px;border:2.5px solid var(--border);padding:8px 40px 8px 8px;min-height:52px;max-height:68px;display:flex;align-items:center;flex-wrap:wrap;gap:4px;position:relative;transition:border-color .2s,background .2s;flex-shrink:0;}
.answer-wrap.correct{border-color:var(--mint);background:var(--mint-light);}
.answer-wrap.wrong{border-color:var(--coral);background:var(--coral-light);}
.answer-ph{font-size:13px;color:#C8B080;font-weight:600;}
.letter-chip{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:36px;padding:0 4px;background:var(--honey-light);border:2px solid var(--honey);border-radius:8px;font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;color:var(--text);cursor:pointer;box-shadow:0 2px 0 var(--border);}
.letter-chip:active{transform:scale(0.9);}
.clear-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:var(--coral-light);border:1.5px solid var(--coral);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--coral);}

/* ── Result ── */
.result-area{text-align:center;flex-shrink:0;min-height:48px;display:flex;align-items:center;justify-content:center;}
.result-msg{font-family:'Baloo 2',cursive;font-size:15px;font-weight:700;transition:all .2s;}
.result-msg.ok{color:var(--mint-dark);}
.result-msg.no{color:var(--coral);}
.result-msg.hint{color:var(--sky);}
.reveal-word{font-family:'Nunito',sans-serif;font-size:36px;font-weight:800;color:#1D9E75;letter-spacing:3px;display:block;line-height:1;}
.reveal-label{font-size:12px;color:#888;display:block;margin-bottom:2px;}

/* ── Keyboard ── */
.keyboard{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;flex-shrink:0;}
.key{display:flex;align-items:center;justify-content:center;height:40px;border-radius:9px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:var(--text);cursor:pointer;user-select:none;border:2px solid transparent;transition:transform .1s,box-shadow .1s;}
.key:active{transform:translateY(2px);box-shadow:none!important;}
.key:nth-child(9n+1){background:#FFE4E4;border-color:#FFBCBC;box-shadow:0 3px 0 #FFBCBC;}
.key:nth-child(9n+2){background:#FFE9CC;border-color:#FFCC88;box-shadow:0 3px 0 #FFCC88;}
.key:nth-child(9n+3){background:#FFFACC;border-color:#FFE966;box-shadow:0 3px 0 #FFE966;}
.key:nth-child(9n+4){background:#E4F9E4;border-color:#99DDA6;box-shadow:0 3px 0 #99DDA6;}
.key:nth-child(9n+5){background:#E4F5FF;border-color:#88CCFF;box-shadow:0 3px 0 #88CCFF;}
.key:nth-child(9n+6){background:#F0E8FF;border-color:#CC99FF;box-shadow:0 3px 0 #CC99FF;}
.key:nth-child(9n+7){background:#FFE4F5;border-color:#FFAADD;box-shadow:0 3px 0 #FFAADD;}
.key:nth-child(9n+8){background:#E8FFE8;border-color:#88EE99;box-shadow:0 3px 0 #88EE99;}
.key:nth-child(9n+9){background:#FFF0CC;border-color:#FFD966;box-shadow:0 3px 0 #FFD966;}
.key.del-key{background:#FFE4E4;border-color:#FFAAAA;box-shadow:0 3px 0 #FFAAAA;font-size:18px;}
.key.shift-key{background:#FF9800;border-color:#E65100;box-shadow:0 3px 0 #E65100;font-family:'Baloo 2',cursive;font-size:12px;font-weight:800;color:white;grid-column:span 2;}
.key.shift-key.active{background:#E65100;border-color:#BF360C;box-shadow:0 3px 0 #BF360C;color:white;}

/* ── Actions ── */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;flex-shrink:0;}
.btn-check{padding:11px;background:var(--mint);border:none;border-radius:12px;font-family:'Baloo 2',cursive;font-size:15px;font-weight:700;color:white;cursor:pointer;box-shadow:0 4px 0 var(--mint-dark);transition:transform .1s,box-shadow .1s;}
.btn-check:active{transform:translateY(3px);box-shadow:0 1px 0 var(--mint-dark);}
.btn-reveal{padding:11px;background:var(--sky-light);border:2px solid var(--sky);border-radius:12px;font-family:'Baloo 2',cursive;font-size:15px;font-weight:700;color:#1A6FBB;cursor:pointer;box-shadow:0 4px 0 #88BBEE;transition:transform .1s,box-shadow .1s;}
.btn-reveal:active{transform:translateY(3px);box-shadow:0 1px 0 #88BBEE;}

/* ── Bottom row ── */
.bottom-row{display:flex;gap:6px;flex-shrink:0;}
.btn-shuffle,.btn-reset{flex:1;padding:9px;border-radius:12px;font-family:'Baloo 2',cursive;font-size:13px;font-weight:700;cursor:pointer;transition:transform .1s,box-shadow .1s;}
.btn-shuffle{background:var(--honey-light);border:2px solid var(--honey);color:var(--text);box-shadow:0 3px 0 var(--honey-dark);}
.btn-shuffle:active{transform:translateY(2px);box-shadow:0 1px 0 var(--honey-dark);}
.btn-reset{background:#FFEAEA;border:2px solid #FFAAAA;color:#CC3333;box-shadow:0 3px 0 #FFAAAA;}
.btn-reset:active{transform:translateY(2px);box-shadow:0 1px 0 #FFAAAA;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo"><span class="logo-bee">🐝</span>Spelling Bee</div>
    <div class="header-right">
      <div class="score-badge" id="score-badge">⭐ 0</div>
    </div>
  </div>

  <div class="progress-row">
    <div class="word-label" id="word-label">Word 1/156</div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:1%"></div></div>
  </div>

  <div class="sound-nav">
    <button class="btn-nav" onclick="prevWord()">←</button>
    <button class="sound-card" onclick="speakWord()">
      <span class="sound-icon" id="sound-icon">🔊</span>
      <div class="sound-label" id="sound-label">Tap to hear!</div>
    </button>
    <button class="btn-nav" onclick="nextWord()">→</button>
  </div>

  <div class="answer-wrap" id="answer-box">
    <span class="answer-ph" id="ph">Spell it out! 👇</span>
  </div>

  <div class="result-area">
    <div class="result-msg" id="result-msg"></div>
  </div>

  <div class="keyboard" id="keyboard"></div>

  <div class="actions">
    <button class="btn-check" onclick="checkAnswer()">✅ Check!</button>
    <button class="btn-reveal" onclick="revealAnswer()">💡 Show answer</button>
  </div>

  <div class="bottom-row">
    <button class="btn-shuffle" onclick="shuffleWords()">🔀 Shuffle</button>
    <button class="btn-reset" onclick="resetGame()">🔁 Start over</button>
  </div>
</div>

<script>
const words=["see","toilet","foot","bird","pine","frame","love","queen","the","yellow","fork","blind","pink","frog","make","road","a","teacher","fruit","blue","plane","grape","where","round","is","teeth","gauze","boil","rich","hole","some","row","tie","glue","boo","rip","hop","get","saw","it","toaster","goat","bowl","ripe","hate","may","sea","like","gown","brown","rob","hose","which","shirt","can","toy","green","car","rope","huge","then","short","to","train","haul","card","shave","ink","these","singer","go","tree","hay","church","shell","king","people","sky","be","turtle","horse","climb","ship","kit","word","snow","me","window","house","cloud","shop","kite","what","soap","have","wood","key","coat","sick","lock","all","soil","you","yawn","kind","coin","sink","lunch","eat","spoon","do","loud","cook","skate","man","just","spy","am","zoo","meat","cow","skunk","math","said","store","not","pool","monkey","crown","slide","mole","something","straw","of","pray","mouse","cry","smell","moth","would","strawberry","by","purse","my","die","smile","luck","with","truck","in","mouth","draw","flake","snail","snake","toad"];
const AUDIO={};
let shuffled=[...words].sort(()=>Math.random()-.5);
let cur=0,typed=[],score=0,checked={};
let shiftOn=false;
let currentAudio=null;

function buildKeyboard(){
  const kb=document.getElementById('keyboard');
  kb.innerHTML='';
  'abcdefghijklmnopqrstuvwxyz'.split('').forEach((l,i)=>{
    const k=document.createElement('div');
    k.className='key';
    k.textContent=shiftOn?l.toUpperCase():l;
    k.dataset.letter=l;
    k.addEventListener('pointerdown',e=>{e.preventDefault();addLetter(shiftOn?l.toUpperCase():l);});
    kb.appendChild(k);
    if(i===25){
      const d=document.createElement('div');
      d.className='key del-key';
      d.textContent='⌫';
      d.addEventListener('pointerdown',e=>{e.preventDefault();removeLetter();});
      kb.appendChild(d);
    }
  });
  const shift=document.createElement('div');
  shift.className='key shift-key'+(shiftOn?' active':'');
  shift.textContent=shiftOn?'Aa▲':'Aa';
  shift.addEventListener('pointerdown',e=>{
    e.preventDefault();
    shiftOn=!shiftOn;
    buildKeyboard();
  });
  kb.appendChild(shift);
}

function updateUI(){
  document.getElementById('word-label').textContent=`Word ${cur+1}/${shuffled.length}`;
  document.getElementById('prog-fill').style.width=((cur+1)/shuffled.length*100)+'%';
  document.getElementById('score-badge').textContent=`⭐ ${score}`;
  document.getElementById('sound-icon').textContent='🔊';
  document.getElementById('sound-label').textContent='Tap to hear!';
  document.getElementById('result-msg').textContent='';
  document.getElementById('result-msg').className='result-msg';
  document.getElementById('answer-box').className='answer-wrap';
  renderBox();
  setTimeout(speakWord,300);
}

function renderBox(){
  const box=document.getElementById('answer-box');
  const ph=document.getElementById('ph');
  box.querySelectorAll('.letter-chip,.clear-btn').forEach(e=>e.remove());
  if(!typed.length){ph.style.display='';return;}
  ph.style.display='none';
  typed.forEach((l,i)=>{
    const c=document.createElement('div');c.className='letter-chip';c.textContent=l;
    c.addEventListener('pointerdown',e=>{e.preventDefault();typed.splice(i,1);renderBox();});
    box.appendChild(c);
  });
  const x=document.createElement('div');x.className='clear-btn';x.textContent='✕';
  x.addEventListener('pointerdown',e=>{e.preventDefault();typed=[];renderBox();});
  box.appendChild(x);
}

function addLetter(l){typed.push(l);renderBox();}
function removeLetter(){typed.pop();renderBox();}

function getBestVoice(){
  const vs=speechSynthesis.getVoices();
  const prefer=['Samantha','Karen','Moira','Google US English','Microsoft Zira'];
  for(const p of prefer){const v=vs.find(v=>v.name.includes(p));if(v)return v;}
  return vs.find(v=>v.lang.startsWith('en'))||null;
}

function speakWord(){
  const word=shuffled[cur];
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  speechSynthesis.cancel();
  if(AUDIO[word]){
    const audio=new Audio('data:audio/mp3;base64,'+AUDIO[word]);
    audio.volume=1.0;
    currentAudio=audio;
    document.getElementById('sound-icon').textContent='🎵';
    document.getElementById('sound-label').textContent='Listening...';
    audio.onended=()=>{
      document.getElementById('sound-icon').textContent='🔊';
      document.getElementById('sound-label').textContent='Tap to hear again!';
    };
    audio.play();
  } else {
    const u=new SpeechSynthesisUtterance(word);
    u.lang='en-US';u.rate=0.78;u.pitch=1.05;
    const v=getBestVoice();if(v)u.voice=v;
    document.getElementById('sound-icon').textContent='🎵';
    document.getElementById('sound-label').textContent='Listening...';
    u.onend=()=>{
      document.getElementById('sound-icon').textContent='🔊';
      document.getElementById('sound-label').textContent='Tap to hear again!';
    };
    speechSynthesis.speak(u);
  }
}

function checkAnswer(){
  const word=shuffled[cur];
  const ans=typed.join('').toLowerCase();
  const msg=document.getElementById('result-msg');
  const box=document.getElementById('answer-box');
  if(!ans){msg.textContent='Type something first! 🐝';msg.className='result-msg hint';return;}
  if(ans===word){
    box.className='answer-wrap correct';
    const cheers=['Amazing! 🎉','You got it! 🌟','Brilliant! 🏆','Correct! 🎊','Super star! ⭐'];
    msg.textContent=cheers[Math.floor(Math.random()*cheers.length)];
    msg.className='result-msg ok';
    if(!checked[cur]){score++;checked[cur]=true;}
    document.getElementById('score-badge').textContent=`⭐ ${score}`;
  } else {
    box.className='answer-wrap wrong';
    const tries=['Try again! 💪','Almost! 🤔','Keep going! 🐝','You can do it! 🌈'];
    msg.textContent=tries[Math.floor(Math.random()*tries.length)];
    msg.className='result-msg no';
  }
}

function revealAnswer(){
  const word=shuffled[cur];
  const display=shiftOn?word.toUpperCase():word;
  const msg=document.getElementById('result-msg');
  msg.innerHTML=`<span class="reveal-label">The word is</span><span class="reveal-word">${display}</span>`;
  msg.className='result-msg hint';
}

function nextWord(){
  if(cur<shuffled.length-1){cur++;typed=[];updateUI();}
  else{
    const msg=document.getElementById('result-msg');
    msg.innerHTML=`<span style="font-size:15px">All done! 🏆 Score: ${score}/${shuffled.length}</span>`;
    msg.className='result-msg ok';
  }
}

function prevWord(){if(cur>0){cur--;typed=[];updateUI();}}

function shuffleWords(){
  shuffled=[...words].sort(()=>Math.random()-.5);
  cur=0;typed=[];checked={};score=0;updateUI();
}

function resetGame(){
  cur=0;typed=[];checked={};score=0;updateUI();
}

if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=()=>{};
buildKeyboard();
setTimeout(updateUI,400);
</script>
</body>
</html>
